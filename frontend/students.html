<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - EduTrack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>📚 EduTrack</h2>
        <div class="nav-links">
            <span id="userName"></span>
            <a href="dashboard.html">Dashboard</a>
            <a href="students.html">Students</a>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Student Management</h2>
            <a href="add-student.html" class="btn btn-primary" style="width:auto;">+ Add New Student</a>
        </div>

        <input type="text" id="search" class="search" placeholder="Search by name, ID, or email..." onkeyup="filterStudents()">

        <div class="recent-section" style="overflow-x:auto;">
            <table id="studentTable">
                <thead>
                    <tr><th>Student ID</th><th>Name</th><th>Email</th><th>Department</th><th>Year</th><th>GPA</th><th>Actions</th></tr>
                </thead>
                <tbody id="studentBody">
                    <tr><td colspan="7">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="theme.js"></script>
    <script>
        let allStudents = [];

        async function checkAuth() {
            try {
                const response = await fetch('/api/me', { credentials: 'include' });
                const data = await response.json();
                if (!data.authenticated) {
                    window.location.href = 'login.html';
                } else {
                    document.getElementById('userName').textContent = data.user.full_name;
                }
            } catch (error) {
                window.location.href = 'login.html';
            }
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value === null || value === undefined ? '' : String(value);
            return div.innerHTML;
        }

        async function loadStudents() {
            try {
                const response = await fetch('/api/students', { credentials: 'include' });

                if (response.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }

                allStudents = await response.json();
                displayStudents(allStudents);
            } catch (error) {
                document.getElementById('studentBody').innerHTML = '<tr><td colspan="7">Error loading students</td></tr>';
            }
        }

        function displayStudents(students) {
            const body = document.getElementById('studentBody');
            if (students.length === 0) {
                body.innerHTML = '<tr><td colspan="7">No students found</td></tr>';
                return;
            }

            body.innerHTML = students.map(s => `
                <tr>
                    <td>${escapeHtml(s.student_id)}</td>
                    <td>${escapeHtml(s.name)}</td>
                    <td>${escapeHtml(s.email)}</td>
                    <td>${escapeHtml(s.department_name || 'N/A')}</td>
                    <td>${escapeHtml(s.year_level)}</td>
                    <td>${escapeHtml(s.gpa)}</td>
                    <td>
                        <button class="btn btn-edit" onclick="editStudent(${s.id})">Edit</button>
                        <button class="btn btn-delete" onclick="deleteStudent(${s.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterStudents() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = allStudents.filter(s =>
                s.name.toLowerCase().includes(search) ||
                s.student_id.toLowerCase().includes(search) ||
                s.email.toLowerCase().includes(search)
            );
            displayStudents(filtered);
        }

        function editStudent(id) {
            window.location.href = `edit-student.html?id=${id}`;
        }

        async function deleteStudent(id) {
            if (confirm('Are you sure you want to delete this student?')) {
                await fetch(`/api/students/${id}`, { method: 'DELETE', credentials: 'include' });
                loadStudents();
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = 'login.html';
        }

        checkAuth();
        loadStudents();
    </script>
</body>
</html>
